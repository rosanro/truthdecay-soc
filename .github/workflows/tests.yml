name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core, sin dependencias)
        run: pip install -e .
      - name: Compile all modules
        run: python -m compileall -q .
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Smoke del pipeline de resultados (mock)
        run: python run_grid.py --client mock:credulous --save-traces --out /tmp/results
